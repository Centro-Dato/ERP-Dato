<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Centro Dato — Tablet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --azul:#0c416d;--azul2:#0270c4;--verde:#16a34a;--rojo:#dc2626;--ambar:#d97706;
  --bg:#f0f4f8;--card:#fff;--text:#1e293b;--sub:#64748b;--border:#e2e8f0;
}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.hidden{display:none!important}

/* ===== LOGIN ===== */
#login-screen{
  height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#0c416d 0%,#0270c4 60%,#38bdf8 100%);
  padding:32px;
}
.login-logo{width:80px;height:80px;background:rgba(255,255,255,.15);border-radius:24px;
  display:flex;align-items:center;justify-content:center;font-size:42px;margin-bottom:20px;
  box-shadow:0 8px 32px rgba(0,0,0,.2);backdrop-filter:blur(10px)}
.login-titulo{font-size:32px;font-weight:900;color:#fff;margin-bottom:6px;letter-spacing:-0.5px}
.login-sub{font-size:16px;color:rgba(255,255,255,.65);margin-bottom:40px}
.login-box{background:rgba(255,255,255,.12);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.2);
  border-radius:24px;padding:32px;width:100%;max-width:420px}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:14px;font-weight:700;color:rgba(255,255,255,.8);margin-bottom:8px}
.login-field input{width:100%;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);
  border-radius:14px;padding:14px 18px;font-size:16px;font-family:'Nunito',sans-serif;
  color:#fff;outline:none;transition:border .2s}
.login-field input::placeholder{color:rgba(255,255,255,.4)}
.login-field input:focus{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.2)}
.login-err{background:rgba(220,38,38,.3);border:1px solid rgba(220,38,38,.5);color:#fff;
  border-radius:10px;padding:10px 14px;font-size:14px;margin-bottom:12px;text-align:center}
.btn-login{width:100%;background:#fff;color:var(--azul);border:none;border-radius:14px;
  padding:16px;font-size:17px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;
  transition:transform .1s,box-shadow .2s;box-shadow:0 4px 20px rgba(0,0,0,.15);margin-top:8px}
.btn-login:active{transform:scale(.98)}

/* ===== APP ===== */
#app-screen{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
.t-header{
  background:linear-gradient(135deg,var(--azul),var(--azul2));
  padding:16px 24px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;box-shadow:0 4px 20px rgba(12,65,109,.3)
}
.t-header-left{display:flex;align-items:center;gap:14px}
.t-logo{width:42px;height:42px;background:rgba(255,255,255,.15);border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:22px}
.t-titulo{font-size:20px;font-weight:900;color:#fff}
.t-fecha{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px}
.t-header-right{display:flex;align-items:center;gap:12px}
.t-user-chip{background:rgba(255,255,255,.15);border-radius:20px;padding:8px 14px;
  display:flex;align-items:center;gap:8px}
.t-avatar{width:32px;height:32px;border-radius:50%;background:var(--azul2);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff}
.t-user-name{font-size:13px;font-weight:700;color:#fff}
.btn-logout-t{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.7);border-radius:10px;padding:8px 14px;font-size:13px;
  font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.btn-logout-t:active{background:rgba(255,255,255,.2)}

/* Nav tabs */
.t-nav{background:#fff;border-bottom:2px solid var(--border);display:flex;flex-shrink:0}
.t-nav-btn{flex:1;padding:14px 8px;font-size:13px;font-weight:700;color:var(--sub);
  border:none;background:none;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:4px;font-family:'Nunito',sans-serif;border-bottom:3px solid transparent;
  margin-bottom:-2px;transition:color .15s}
.t-nav-btn .t-nav-icon{font-size:22px}
.t-nav-btn.active{color:var(--azul2);border-bottom-color:var(--azul2)}
.t-nav-btn:active{background:#f8fafc}
.t-badge{background:var(--rojo);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:800}

/* Main content area */
.t-main{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}

/* ===== VISTAS ===== */

/* INICIO */
.t-bienvenida{font-size:22px;font-weight:800;color:var(--azul);margin-bottom:4px}
.t-bienvenida-sub{font-size:14px;color:var(--sub);margin-bottom:20px}
.t-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.t-stat-card{background:var(--card);border-radius:20px;padding:20px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);display:flex;align-items:center;gap:14px;
  border:2px solid transparent;cursor:pointer;transition:transform .1s,box-shadow .15s}
.t-stat-card:active{transform:scale(.97)}
.t-stat-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;
  justify-content:center;font-size:28px;flex-shrink:0}
.t-stat-icon.rojo{background:#fef2f2}
.t-stat-icon.verde{background:#f0fdf4}
.t-stat-icon.ambar{background:#fffbeb}
.t-stat-icon.azul{background:#eff6ff}
.t-stat-num{font-size:32px;font-weight:900;line-height:1}
.t-stat-lbl{font-size:12px;font-weight:700;color:var(--sub);margin-top:3px}
.t-stat-card.rojo-border{border-color:#fecaca}
.t-stat-card.verde-border{border-color:#bbf7d0}
.t-stat-card.ambar-border{border-color:#fde68a}
.t-stat-card.azul-border{border-color:#bfdbfe}

/* Accesos rápidos */
.t-section-title{font-size:14px;font-weight:800;color:var(--sub);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:12px}
.t-accesos{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.t-acceso{background:var(--card);border-radius:18px;padding:16px 8px;text-align:center;
  cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.05);transition:transform .1s;border:none;
  font-family:'Nunito',sans-serif}
.t-acceso:active{transform:scale(.95)}
.t-acceso-icon{font-size:30px;display:block;margin-bottom:6px}
.t-acceso-lbl{font-size:11px;font-weight:700;color:var(--text)}

/* ===== USUARIOS ===== */
.t-search{width:100%;background:var(--card);border:2px solid var(--border);border-radius:16px;
  padding:14px 18px;font-size:16px;font-family:'Nunito',sans-serif;color:var(--text);
  outline:none;margin-bottom:16px}
.t-search:focus{border-color:var(--azul2)}
.t-user-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.t-user-card{background:var(--card);border-radius:20px;padding:18px;text-align:center;
  cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.06);transition:transform .1s,box-shadow .15s;
  border:2px solid transparent}
.t-user-card:active{transform:scale(.96);box-shadow:0 4px 20px rgba(0,0,0,.1)}
.t-user-avatar{width:60px;height:60px;border-radius:50%;margin:0 auto 10px;
  display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;
  color:#fff;flex-shrink:0}
.t-user-nombre{font-size:13px;font-weight:800;line-height:1.3}
.t-user-apellidos{font-size:11px;color:var(--sub);margin-top:2px}
.t-user-badge{display:inline-block;background:#eff6ff;color:var(--azul2);border-radius:8px;
  padding:3px 8px;font-size:10px;font-weight:700;margin-top:6px}

/* ===== FICHA USUARIO (overlay) ===== */
#ficha-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  display:flex;flex-direction:column;overflow:hidden}
.ficha-header{background:linear-gradient(135deg,var(--azul),var(--azul2));padding:20px 24px;
  display:flex;align-items:center;gap:16px;flex-shrink:0}
.ficha-avatar{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:26px;font-weight:800;color:#fff;flex-shrink:0;
  border:3px solid rgba(255,255,255,.3)}
.ficha-info{flex:1}
.ficha-nombre{font-size:20px;font-weight:900;color:#fff}
.ficha-meta{font-size:13px;color:rgba(255,255,255,.65);margin-top:2px}
.btn-cerrar-ficha{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:12px;
  padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.ficha-body{background:var(--bg);flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.reg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.reg-btn{background:var(--card);border-radius:20px;padding:20px 12px;text-align:center;
  cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.06);border:2px solid transparent;
  transition:transform .1s;display:flex;flex-direction:column;align-items:center;gap:8px}
.reg-btn:active{transform:scale(.95)}
.reg-btn .reg-icon{font-size:36px}
.reg-btn .reg-lbl{font-size:12px;font-weight:800;color:var(--text);line-height:1.3}
.reg-btn .reg-count{font-size:10px;font-weight:700;background:#f1f5f9;color:var(--sub);
  border-radius:8px;padding:2px 8px;margin-top:2px}
.reg-btn.tiene{border-color:#bbf7d0;background:#f0fdf4}
.reg-btn.pendiente{border-color:#fde68a;background:#fffbeb}

/* ===== REGISTROS (lista) ===== */
.reg-lista-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.reg-lista-titulo{font-size:20px;font-weight:900;flex:1}
.reg-item{background:var(--card);border-radius:16px;padding:16px 18px;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.reg-item-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;
  justify-content:center;font-size:24px;flex-shrink:0}
.reg-item-info{flex:1}
.reg-item-titulo{font-size:14px;font-weight:800}
.reg-item-meta{font-size:12px;color:var(--sub);margin-top:2px}
.btn-reg{background:var(--azul2);color:#fff;border:none;border-radius:12px;padding:10px 18px;
  font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap}
.btn-reg:active{background:var(--azul)}

/* ===== ASISTENCIA ===== */
.asist-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.asist-card{background:var(--card);border-radius:20px;padding:16px;
  display:flex;align-items:center;gap:14px;box-shadow:0 2px 10px rgba(0,0,0,.05);cursor:pointer}
.asist-card:active{background:#f8fafc}
.asist-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0}
.asist-info{flex:1}
.asist-nombre{font-size:14px;font-weight:800;line-height:1.3}
.asist-hora{font-size:11px;color:var(--sub);margin-top:2px}
.asist-toggle{width:52px;height:30px;border-radius:15px;border:none;cursor:pointer;
  font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:background .2s;flex-shrink:0}
.asist-toggle.presente{background:#dcfce7}
.asist-toggle.ausente{background:#f1f5f9}

/* ===== ALERTAS ===== */
.alerta-card{background:var(--card);border-radius:18px;padding:18px;margin-bottom:12px;
  display:flex;gap:14px;align-items:flex-start;box-shadow:0 2px 10px rgba(0,0,0,.05);
  border-left:4px solid transparent}
.alerta-card.alta{border-left-color:var(--rojo)}
.alerta-card.media{border-left-color:var(--ambar)}
.alerta-card.baja{border-left-color:var(--verde)}
.alerta-icon{font-size:28px;flex-shrink:0;margin-top:2px}
.alerta-titulo{font-size:15px;font-weight:800}
.alerta-desc{font-size:13px;color:var(--sub);margin-top:4px;line-height:1.5}
.alerta-hora{font-size:11px;color:var(--sub);margin-top:6px;font-weight:600}

/* ===== TURNO ===== */
.turno-hora{font-size:11px;font-weight:800;color:var(--sub);text-transform:uppercase;
  letter-spacing:.1em;margin:16px 0 8px}
.turno-item{background:var(--card);border-radius:16px;padding:16px 18px;margin-bottom:8px;
  display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.turno-hora-badge{width:52px;height:52px;border-radius:14px;background:#eff6ff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.turno-hora-h{font-size:15px;font-weight:900;color:var(--azul2)}
.turno-hora-m{font-size:10px;font-weight:700;color:var(--sub)}
.turno-info{flex:1}
.turno-titulo{font-size:14px;font-weight:800}
.turno-meta{font-size:12px;color:var(--sub);margin-top:2px}
.turno-check{width:36px;height:36px;border-radius:10px;border:2px solid var(--border);
  background:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.turno-check.done{background:#dcfce7;border-color:#86efac}

/* ===== MODAL REGISTRO ===== */
#modal-reg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
  display:flex;align-items:flex-end}
.modal-reg-box{background:var(--card);border-radius:28px 28px 0 0;width:100%;
  padding:28px;max-height:85vh;overflow-y:auto}
.modal-reg-titulo{font-size:20px;font-weight:900;margin-bottom:4px}
.modal-reg-usuario{font-size:14px;color:var(--sub);margin-bottom:24px}
.modal-field-t{margin-bottom:16px}
.modal-field-t label{display:block;font-size:13px;font-weight:700;color:var(--sub);margin-bottom:6px}
.modal-field-t select,.modal-field-t textarea,.modal-field-t input{
  width:100%;border:2px solid var(--border);border-radius:14px;padding:14px 16px;
  font-size:15px;font-family:'Nunito',sans-serif;color:var(--text);outline:none;
  background:var(--bg);transition:border .2s}
.modal-field-t select:focus,.modal-field-t textarea:focus,.modal-field-t input:focus{border-color:var(--azul2);background:#fff}
.modal-field-t textarea{resize:none;height:100px}
.modal-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.modal-opt-btn{border:2px solid var(--border);border-radius:14px;padding:14px;
  font-size:14px;font-weight:700;cursor:pointer;background:var(--bg);
  font-family:'Nunito',sans-serif;text-align:center;transition:all .15s}
.modal-opt-btn.sel{background:var(--azul2);color:#fff;border-color:var(--azul2)}
.modal-opt-btn:active{transform:scale(.97)}
.modal-reg-actions{display:grid;grid-template-columns:1fr 2fr;gap:12px;margin-top:20px}
.btn-cancelar-t{border:2px solid var(--border);background:none;border-radius:14px;
  padding:16px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.btn-guardar-t{background:var(--verde);color:#fff;border:none;border-radius:14px;
  padding:16px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}
.btn-guardar-t:active{background:#15803d}
.modal-drag{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Toast */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:#1e293b;color:#fff;border-radius:14px;padding:12px 24px;
  font-size:14px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;
  pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
  <div class="login-logo">🏥</div>
  <div class="login-titulo">Centro Dato</div>
  <div class="login-sub">Acceso para profesionales</div>
  <div class="login-box">
    <div id="login-err" class="login-err hidden">Usuario o contraseña incorrectos</div>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="t-email" placeholder="usuario@centrodato.org" autocomplete="username"/>
    </div>
    <div class="login-field">
      <label>Contraseña</label>
      <input type="password" id="t-pass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-login" id="btn-t-login">Entrar →</button>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app-screen" class="hidden">
  <div class="t-header">
    <div class="t-header-left">
      <div class="t-logo">🏥</div>
      <div>
        <div class="t-titulo">Centro Dato</div>
        <div class="t-fecha" id="t-fecha-hoy"></div>
      </div>
    </div>
    <div class="t-header-right">
      <div class="t-user-chip">
        <div class="t-avatar" id="t-av">C</div>
        <div class="t-user-name" id="t-nombre">Cuidador</div>
      </div>
      <button class="btn-logout-t" onclick="tLogout()">Salir</button>
    </div>
  </div>

  <div class="t-nav">
    <button class="t-nav-btn active" onclick="tNav('inicio',this)">
      <span class="t-nav-icon">🏠</span>Inicio
    </button>
    <button class="t-nav-btn" onclick="tNav('usuarios',this)">
      <span class="t-nav-icon">👥</span>Usuarios
    </button>
    <button class="t-nav-btn" onclick="tNav('asistencia',this)">
      <span class="t-nav-icon">✅</span>Asistencia
    </button>
    <button class="t-nav-btn" onclick="tNav('alertas',this)">
      <span class="t-nav-icon">🔔</span>Alertas
      <span class="t-badge" id="badge-alertas">3</span>
    </button>
    <button class="t-nav-btn" onclick="tNav('turno',this)">
      <span class="t-nav-icon">📋</span>Mi turno
    </button>
  </div>

  <div class="t-main">
    <div id="vista-inicio"></div>
    <div id="vista-usuarios" class="hidden"></div>
    <div id="vista-asistencia" class="hidden"></div>
    <div id="vista-alertas" class="hidden"></div>
    <div id="vista-turno" class="hidden"></div>
  </div>
</div>

<!-- ===== FICHA USUARIO ===== -->
<div id="ficha-overlay" class="hidden">
  <div class="ficha-header">
    <div class="ficha-avatar" id="ficha-av">A</div>
    <div class="ficha-info">
      <div class="ficha-nombre" id="ficha-nombre">Nombre</div>
      <div class="ficha-meta" id="ficha-meta">—</div>
    </div>
    <button class="btn-cerrar-ficha" onclick="cerrarFicha()">✕ Cerrar</button>
  </div>
  <div class="ficha-body">
    <div class="t-section-title" style="margin-bottom:14px">Registrar acción</div>
    <div class="reg-grid" id="ficha-reg-grid"></div>
  </div>
</div>

<!-- ===== MODAL REGISTRO ===== -->
<div id="modal-reg" class="hidden">
  <div class="modal-reg-box">
    <div class="modal-drag"></div>
    <div class="modal-reg-titulo" id="mreg-titulo">Registro</div>
    <div class="modal-reg-usuario" id="mreg-usuario">Usuario</div>
    <div id="mreg-body"></div>
    <div class="modal-reg-actions">
      <button class="btn-cancelar-t" onclick="cerrarModalReg()">Cancelar</button>
      <button class="btn-guardar-t" onclick="guardarReg()">✓ Guardar registro</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ===== DATOS ===== */
var BD=[
{id:1,n:"Alan Javier",a:"Hermo Placeres",fnac:"1986-04-08",est:"activo",gr:"II",et:"PC"},
{id:2,n:"Alejandra",a:"Sagüés García",fnac:"1992-11-30",est:"activo",gr:"III",et:"PC"},
{id:3,n:"Alejandro",a:"González Arias",fnac:"1979-12-21",est:"activo",gr:"III",et:"TCE"},
{id:5,n:"Alfonso Luis",a:"Julián Vicaria",fnac:"1976-01-28",est:"activo",et:null},

  var meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('t-fecha-hoy').textContent =

var _vistaActual = 'inicio';
function tNav(vista, btn){
  document.querySelectorAll('.t-nav-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  ['inicio','usuarios','asistencia','alertas','turno'].forEach(function(v){
    document.getElementById('vista-'+v).classList.toggle('hidden', v!==vista);
  });
  _vistaActual = vista;
  if(vista==='inicio') renderInicio();
  else if(vista==='usuarios') renderUsuarios();
  else if(vista==='asistencia') renderAsistencia();
  else if(vista==='alertas') renderAlertas();
  else if(vista==='turno') renderTurno();
}

/* ===== INICIO ===== */
function renderInicio(){
  var d = new Date();
  var h=d.getHours();
  var saludo=h<12?'Buenos días':h<19?'Buenas tardes':'Buenas noches';

  var presentes = Object.keys(ASISTENCIA).filter(function(k){return ASISTENCIA[k].presente;}).length;
  var totalReg = Object.keys(REGISTROS).reduce(function(s,k){return s+(REGISTROS[k]||[]).length;},0);
  var pendientes = Math.max(0, USUARIOS_ACTIVOS.length * 2 - totalReg);

  var html = '<div class="t-bienvenida">'+saludo+', '+(_userActual?_userActual.nombre.split(' ')[0]:'')+'! 👋</div>';
  html += '<div class="t-bienvenida-sub">Turno activo · '+USUARIOS_ACTIVOS.length+' usuarios en el centro hoy</div>';

  html += '<div class="t-stats-grid">';
  html += tarjetaStat('🔴','rojo','rojo-border',pendientes,'Pendientes','Ver registros pendientes','alertas');
  html += tarjetaStat('✅','verde','verde-border',presentes,'Presentes hoy','Ver asistencia','asistencia');
  html += tarjetaStat('⚠️','ambar','ambar-border',3,'Alertas activas','Ver alertas','alertas');
  html += tarjetaStat('📋','azul','azul-border',totalReg,'Registros hoy','Ver registros','usuarios');
  html += '</div>';

  html += '<div class="t-section-title">Acceso rápido</div>';
  html += '<div class="t-accesos">';
  TIPOS_REG.slice(0,8).forEach(function(t){
    html += '<button class="t-acceso" onclick="abrirRegRapido(\''+t.id+'\')">';
    html += '<span class="t-acceso-icon">'+t.icon+'</span>';
    html += '<span class="t-acceso-lbl">'+t.label+'</span>';
    html += '</button>';
  });
  html += '</div>';

  document.getElementById('vista-inicio').innerHTML = html;
}

function tarjetaStat(icon, color, border, num, lbl, title, nav){

    '<div class="t-stat-icon '+color+'">'+icon+'</div>' +
    '<div><div class="t-stat-num">'+num+'</div><div class="t-stat-lbl">'+lbl+'</div></div>' +
    '</div>';
}

/* ===== ACCESO RÁPIDO (sin usuario específico) ===== */
function abrirRegRapido(tipoId){
  // Abrir selector de usuario primero
  var tipo = TIPOS_REG.find(function(t){return t.id===tipoId;});
  if(!tipo) return;
  _regActual = {tipo: tipoId, userId: null};

  var html = '<div class="modal-field-t"><label>Seleccionar usuario</label>';
  html += '<select id="mreg-sel-usuario">';
  html += '<option value="">— Selecciona usuario —</option>';
  USUARIOS_ACTIVOS.forEach(function(u){
    html += '<option value="'+u.id+'">'+u.n+' '+u.a+'</option>';
  });
  html += '</select></div>';
  html += buildRegFields(tipo);

  document.getElementById('mreg-titulo').textContent = tipo.icon+' '+tipo.label;
  document.getElementById('mreg-usuario').textContent = 'Selecciona el usuario';
  document.getElementById('mreg-body').innerHTML = html;
  document.getElementById('modal-reg').classList.remove('hidden');
}

function abrirModalReg(tipoId, userId){
  var tipo = TIPOS_REG.find(function(t){return t.id===tipoId;});
  var u = USUARIOS_ACTIVOS.find(function(x){return x.id===userId;});
  if(!tipo||!u) return;
  _regActual = {tipo: tipoId, userId: userId};
  _regOpts = {};

  document.getElementById('mreg-titulo').textContent = tipo.icon+' '+tipo.label;
  document.getElementById('mreg-usuario').textContent = '👤 '+u.n+' '+u.a;
  document.getElementById('mreg-body').innerHTML = buildRegFields(tipo);
  document.getElementById('modal-reg').classList.remove('hidden');
}

function buildRegFields(tipo){
  var html = '';
  tipo.fields.forEach(function(f){
    html += '<div class="modal-field-t"><label>'+f.label+'</label>';
    if(f.opts){
      html += '<div class="modal-opts">';
      f.opts.forEach(function(opt){
        html += '<button class="modal-opt-btn" onclick="selOpt(this,\''+f.k+'\',\''+opt.replace(/'/g,"\\'")+'\')">' +opt+'</button>';
      });
      html += '</div>';
    } else if(f.type==='textarea'){
      html += '<textarea id="mreg-'+f.k+'" placeholder="'+(f.placeholder||'Escribe aquí...')+'"></textarea>';
    } else {
      html += '<input id="mreg-'+f.k+'" type="'+(f.type||'text')+'" placeholder="'+(f.placeholder||'')+'">';
    }
    html += '</div>';
  });
  return html;
}

function selOpt(btn, key, val){
  // Deselect siblings
  var parent = btn.parentElement;
  parent.querySelectorAll('.modal-opt-btn').forEach(function(b){b.classList.remove('sel');});
  btn.classList.add('sel');
  _regOpts[key] = val;
}

function guardarReg(){
  if(!_regActual) return;
  var uid = _regActual.userId;
  if(!uid){
    var sel = document.getElementById('mreg-sel-usuario');
    if(sel) uid = parseInt(sel.value);
    if(!uid){showToast('Selecciona un usuario'); return;}
  }

  // Collect textarea/input values
  var tipo = TIPOS_REG.find(function(t){return t.id===_regActual.tipo;});
  tipo.fields.forEach(function(f){
    var el = document.getElementById('mreg-'+f.k);
    if(el) _regOpts[f.k] = el.value;
  });

  var reg = Object.assign({}, _regOpts, {
    userId: uid,
    fecha: new Date().toISOString(),
    prof: _userActual ? _userActual.nombre : 'Cuidador'
  });

  if(!REGISTROS[_regActual.tipo]) REGISTROS[_regActual.tipo] = [];
  REGISTROS[_regActual.tipo].push(reg);

  cerrarModalReg();
  showToast('✓ Registro guardado');

  // Refresh views
  if(_fichaUsuario) abrirFicha(_fichaUsuario.id);
  if(_vistaActual==='inicio') renderInicio();
  if(_vistaActual==='usuarios') renderUsuarios();
}

function cerrarModalReg(){
  document.getElementById('modal-reg').classList.add('hidden');
  _regActual = null;
  _regOpts = {};
}

/* ===== ASISTENCIA ===== */
function renderAsistencia(){
  var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
  html += '<div style="font-size:20px;font-weight:900">Asistencia hoy</div>';
  var presentes = Object.keys(ASISTENCIA).filter(function(k){return ASISTENCIA[k].presente;}).length;
  html += '<div style="font-size:14px;font-weight:700;color:var(--verde)">'+presentes+' / '+USUARIOS_ACTIVOS.length+' presentes</div>';
  html += '</div>';
  html += '<div class="asist-grid">';
  USUARIOS_ACTIVOS.forEach(function(u){
    var color = colorUsuario(u.id);
    var asist = ASISTENCIA[u.id] || {presente:false, hora:null};
    html += '<div class="asist-card">';
    html += '<div class="asist-av" style="background:'+color+'">'+iniciales(u.n,u.a)+'</div>';
    html += '<div class="asist-info">';
    html += '<div class="asist-nombre">'+esc(u.n)+' '+esc(u.a.split(' ')[0])+'</div>';
    html += '<div class="asist-hora">'+(asist.presente?'Entró: '+(asist.hora||'—'):'Sin registrar')+'</div>';
    html += '</div>';
    html += '<button class="asist-toggle '+(asist.presente?'presente':'ausente')+'" onclick="toggleAsistencia('+u.id+')">';
    html += asist.presente?'✅':'⬜';
    html += '</button>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('vista-asistencia').innerHTML = html;
}

function toggleAsistencia(id){
  var ahora = new Date();
  var hora = ahora.getHours().toString().padStart(2,'0')+':'+ahora.getMinutes().toString().padStart(2,'0');
  if(ASISTENCIA[id] && ASISTENCIA[id].presente){
    ASISTENCIA[id].presente = false;
  } else {
    ASISTENCIA[id] = {presente: true, hora: hora};
  }
  renderAsistencia();
  if(_vistaActual==='inicio') renderInicio();
}

  {hora:'16:00', min:'00', titulo:'Merienda', desc:'Supervisión y registro ingesta', done:false, icon:'🥤'},
  {hora:'16:30', min:'30', titulo:'Actividades de ocio', desc:'Programa de tarde', done:false, icon:'🎭'},
  {hora:'17:00', min:'00', titulo:'Salidas / Transporte', desc:'Preparación y acompañamiento', done:false, icon:'🚌'}
];

function renderTurno(){
  var d = new Date();
  var horaActual = d.getHours()*60 + d.getMinutes();
  var html = '<div style="font-size:20px;font-weight:900;margin-bottom:16px">Programa del turno</div>';
  TURNO_DATA.forEach(function(t, i){
    var hm = parseInt(t.hora)*60+parseInt(t.min);
    var pasado = hm < horaActual;
    html += '<div class="turno-item" style="'+(pasado?'opacity:.55':'')+'"><div class="turno-hora-badge"><div class="turno-hora-h">'+t.hora+'</div></div>';
    html += '<div class="turno-info"><div class="turno-titulo">'+t.icon+' '+t.titulo+'</div>';
    html += '<div class="turno-meta">'+t.desc+'</div></div>';
    html += '<button class="turno-check '+(t.done?'done':'')+'" onclick="toggleTurno('+i+')">'+(t.done?'✅':'')+'</button>';
    html += '</div>';
  });
  document.getElementById('vista-turno').innerHTML = html;
}

function toggleTurno(i){
  TURNO_DATA[i].done = !TURNO_DATA[i].done;
  renderTurno();
}

/* ===== UTILS ===== */
function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');}, 2500);
}

// Actualizar hora cada minuto
setInterval(actualizarFecha, 60000);
</script>
