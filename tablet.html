<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Centro Dato</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--az:#0c416d;--az2:#0270c4;--vd:#16a34a;--rj:#dc2626;--bg:#f0f4f8;--card:#fff;--txt:#1e293b;--sub:#64748b;--brd:#e2e8f0}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
.hidden{display:none!important}

/* LOGIN */
#ls{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#0c416d,#0270c4);padding:40px}
#ls .logo{font-size:60px;margin-bottom:14px}
#ls h1{font-size:36px;font-weight:900;color:#fff;margin-bottom:6px}
#ls p{font-size:16px;color:rgba(255,255,255,.6);margin-bottom:36px}
.lbox{background:rgba(255,255,255,.12);backdrop-filter:blur(20px);border:1.5px solid rgba(255,255,255,.2);
  border-radius:24px;padding:36px;width:100%;max-width:400px}
.lf{margin-bottom:18px}
.lf label{display:block;font-size:14px;font-weight:700;color:rgba(255,255,255,.75);margin-bottom:8px}
.lf input{width:100%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.2);
  border-radius:14px;padding:15px 18px;font-size:17px;font-family:'Nunito',sans-serif;
  color:#fff;outline:none}
.lf input::placeholder{color:rgba(255,255,255,.35)}
.lf input:focus{border-color:rgba(255,255,255,.6)}
.lerr{background:rgba(220,38,38,.35);color:#fff;border-radius:12px;padding:11px 14px;
  font-size:14px;margin-bottom:14px;text-align:center}
.lbtn{width:100%;background:#fff;color:var(--az);border:none;border-radius:14px;
  padding:17px;font-size:18px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:6px}
.lbtn:active{transform:scale(.98)}

/* APP */
#app{height:100vh;display:flex;flex-direction:column}
.hdr{background:linear-gradient(135deg,var(--az),var(--az2));padding:18px 28px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-ico{font-size:28px}
.hdr-t{font-size:20px;font-weight:900;color:#fff}
.hdr-f{font-size:12px;color:rgba(255,255,255,.55);margin-top:2px}
.hdr-r{display:flex;align-items:center;gap:10px}
.hdr-u{background:rgba(255,255,255,.15);border-radius:20px;padding:8px 16px;font-size:14px;font-weight:700;color:#fff}
.salbtn{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);
  border-radius:12px;padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}

.main{flex:1;overflow-y:auto;padding:28px;-webkit-overflow-scrolling:touch}

/* HOME */
#v-home{height:100%;display:flex;align-items:center;justify-content:center}
.home-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;width:100%;height:58vh}
.hbtn{border:none;border-radius:32px;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;font-family:'Nunito',sans-serif;
  box-shadow:0 10px 40px rgba(0,0,0,.15);transition:transform .12s}
.hbtn:active{transform:scale(.95)}
.hbtn-ico{font-size:72px;line-height:1}
.hbtn-lbl{font-size:24px;font-weight:900;color:#fff}
.hbtn-sub{font-size:14px;font-weight:700;color:rgba(255,255,255,.65);margin-top:-10px}
.hbtn.az{background:linear-gradient(145deg,#1d8cf0,#0c416d)}
.hbtn.vd{background:linear-gradient(145deg,#22c55e,#14532d)}
.hbtn.rj{background:linear-gradient(145deg,#f87171,#991b1b)}

/* BACK / TITULO */
.vh{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.bback{background:var(--card);border:2px solid var(--brd);border-radius:14px;
  padding:11px 20px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.bback:active{background:#f1f5f9}
.vtit{font-size:26px;font-weight:900}

/* BUSCAR */
.srch{width:100%;background:var(--card);border:2px solid var(--brd);border-radius:16px;
  padding:15px 20px;font-size:17px;font-family:'Nunito',sans-serif;outline:none;margin-bottom:18px}
.srch:focus{border-color:var(--az2)}

/* USUARIOS GRID */
.ugrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.ucard{background:var(--card);border-radius:22px;padding:22px 14px;text-align:center;
  cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.07);border:2px solid transparent;transition:transform .1s}
.ucard:active{transform:scale(.95)}
.uav{width:66px;height:66px;border-radius:50%;margin:0 auto 12px;
  display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff}
.unm{font-size:14px;font-weight:800;line-height:1.3}
.uap{font-size:12px;color:var(--sub);margin-top:3px}
.uet{display:inline-block;background:#eff6ff;color:var(--az2);border-radius:8px;
  padding:3px 9px;font-size:11px;font-weight:700;margin-top:6px}

/* FICHA */
.fichatop{background:linear-gradient(135deg,var(--az),var(--az2));border-radius:22px;
  padding:24px;display:flex;align-items:center;gap:18px;margin-bottom:22px}
.fav{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:900;color:#fff;border:3px solid rgba(255,255,255,.3);flex-shrink:0}
.fnm{font-size:22px;font-weight:900;color:#fff}
.fmeta{font-size:14px;color:rgba(255,255,255,.6);margin-top:4px}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.rbtn{background:var(--card);border-radius:20px;padding:22px 12px;text-align:center;
  cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.06);border:2px solid var(--brd);
  transition:transform .1s;display:flex;flex-direction:column;align-items:center;gap:10px}
.rbtn:active{transform:scale(.95)}
.rico{font-size:40px}
.rlbl{font-size:14px;font-weight:800}
.rn{font-size:11px;font-weight:700;color:var(--sub);background:#f1f5f9;border-radius:8px;padding:2px 10px}

/* REGISTROS lista */
.rl-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.rl-card{background:var(--card);border-radius:22px;padding:24px 20px;
  display:flex;align-items:center;gap:16px;cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,.06);border:2px solid var(--brd);transition:transform .1s}
.rl-card:active{transform:scale(.97)}
.rl-ico{font-size:42px;flex-shrink:0}
.rl-t{font-size:16px;font-weight:800}
.rl-n{font-size:12px;color:var(--sub);margin-top:3px}

/* INCIDENCIAS */
.incform{background:var(--card);border-radius:22px;padding:26px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.inf{margin-bottom:18px}
.inf label{display:block;font-size:14px;font-weight:700;color:var(--sub);margin-bottom:8px}
.inf select,.inf textarea{width:100%;border:2px solid var(--brd);border-radius:14px;
  padding:14px 16px;font-size:16px;font-family:'Nunito',sans-serif;color:var(--txt);
  outline:none;background:#fff}
.inf select:focus,.inf textarea:focus{border-color:var(--rj)}
.inf textarea{resize:none;height:110px}
.optg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.obtn{border:2px solid var(--brd);border-radius:14px;padding:14px;font-size:15px;
  font-weight:700;cursor:pointer;background:#fff;font-family:'Nunito',sans-serif;text-align:center}
.obtn.sel{background:var(--rj);color:#fff;border-color:var(--rj)}
.obtn:active{transform:scale(.97)}

/* MODAL */
#mdreg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:flex-end}
.mdbox{background:var(--card);border-radius:28px 28px 0 0;width:100%;padding:30px;max-height:88vh;overflow-y:auto}
.mddrag{width:44px;height:5px;background:var(--brd);border-radius:3px;margin:0 auto 22px}
.mdtit{font-size:22px;font-weight:900;margin-bottom:4px}
.mdusr{font-size:14px;color:var(--sub);margin-bottom:22px}
.mdf{margin-bottom:16px}
.mdf label{display:block;font-size:13px;font-weight:700;color:var(--sub);margin-bottom:8px}
.mdf select,.mdf textarea,.mdf input{width:100%;border:2px solid var(--brd);border-radius:14px;
  padding:14px 16px;font-size:16px;font-family:'Nunito',sans-serif;color:var(--txt);outline:none;background:#fff}
.mdf select:focus,.mdf textarea:focus,.mdf input:focus{border-color:var(--az2)}
.mdf textarea{resize:none;height:100px}
.mdopts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.mdopt{border:2px solid var(--brd);border-radius:14px;padding:13px;font-size:14px;
  font-weight:700;cursor:pointer;background:#fff;font-family:'Nunito',sans-serif;text-align:center}
.mdopt.sel{background:var(--az2);color:#fff;border-color:var(--az2)}
.mdact{display:grid;grid-template-columns:1fr 2fr;gap:12px;margin-top:22px}
.bcnc{border:2px solid var(--brd);background:none;border-radius:14px;padding:16px;
  font-size:16px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.bsav{background:var(--vd);color:#fff;border:none;border-radius:14px;padding:16px;
  font-size:17px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}
.bsav:active{background:#15803d}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:#1e293b;color:#fff;border-radius:16px;padding:14px 28px;font-size:15px;font-weight:700;
  z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}
</style>
</head>
<body>

<div id="ls">
  <div class="logo">&#127973;</div>
  <h1>Centro Dato</h1>
  <p>Acceso profesionales</p>
  <div class="lbox">
    <div id="lerr" class="lerr hidden">Usuario o contrase&#241;a incorrectos</div>
    <div class="lf"><label>Email</label><input type="email" id="lem" placeholder="usuario@centrodato.org"/></div>
    <div class="lf"><label>Contrase&#241;a</label><input type="password" id="lpw" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"/></div>
    <button class="lbtn" id="btnl">Entrar &#8594;</button>
  </div>
</div>

<div id="app" class="hidden">
  <div class="hdr">
    <div class="hdr-l">
      <div class="hdr-ico">&#127973;</div>
      <div><div class="hdr-t">Centro Dato</div><div class="hdr-f" id="hfecha"></div></div>
    </div>
    <div class="hdr-r">
      <div class="hdr-u" id="husr">&#8212;</div>
      <button class="salbtn" onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="main">
    <div id="v-home">
      <div class="home-grid">
        <button class="hbtn az" onclick="irA('usuarios')">
          <div class="hbtn-ico">&#128101;</div>
          <div class="hbtn-lbl">Usuarios</div>
          <div class="hbtn-sub">Ver y gestionar</div>
        </button>
        <button class="hbtn vd" onclick="irA('registros')">
          <div class="hbtn-ico">&#128203;</div>
          <div class="hbtn-lbl">Registros</div>
          <div class="hbtn-sub">A&#241;adir anotaciones</div>
        </button>
        <button class="hbtn rj" onclick="irA('incidencias')">
          <div class="hbtn-ico">&#9888;&#65039;</div>
          <div class="hbtn-lbl">Incidencias</div>
          <div class="hbtn-sub">Ca&#237;das y alertas</div>
        </button>
      </div>
    </div>
    <div id="v-usuarios" class="hidden">
      <div class="vh"><button class="bback" onclick="irA('home')">&#8592; Inicio</button><div class="vtit">Usuarios</div></div>
      <input class="srch" id="srchu" placeholder="&#128269; Buscar..." oninput="renderU()"/>
      <div class="ugrid" id="ugrid"></div>
    </div>
    <div id="v-ficha" class="hidden">
      <div class="vh"><button class="bback" onclick="irA('usuarios')">&#8592; Usuarios</button><div class="vtit" id="ftit">Usuario</div></div>
      <div class="fichatop"><div class="fav" id="fav">A</div>
        <div><div class="fnm" id="fnm">&#8212;</div><div class="fmeta" id="fmeta">&#8212;</div></div>
      </div>
      <div class="rgrid" id="rgrid"></div>
    </div>
    <div id="v-registros" class="hidden">
      <div class="vh"><button class="bback" onclick="irA('home')">&#8592; Inicio</button><div class="vtit">Registros</div></div>
      <div class="rl-grid" id="rlgrid"></div>
    </div>
    <div id="v-incidencias" class="hidden">
      <div class="vh"><button class="bback" onclick="irA('home')">&#8592; Inicio</button><div class="vtit">Nueva incidencia</div></div>
      <div class="incform">
        <div class="inf"><label>Usuario afectado</label>
          <select id="inu"><option value="">&#8212; Seleccionar usuario &#8212;</option></select></div>
        <div class="inf"><label>Tipo de incidencia</label>
          <div class="optg" id="intopts">
            <button class="obtn" onclick="sIT(this,'Ca\xedda sin lesi\xf3n')" type="button">&#129299; Ca&#237;da sin lesi&#243;n</button>
            <button class="obtn" onclick="sIT(this,'Ca\xedda con lesi\xf3n')" type="button">&#128680; Ca&#237;da con lesi&#243;n</button>
            <button class="obtn" onclick="sIT(this,'Agitaci\xf3n')" type="button">&#128544; Agitaci&#243;n / Crisis</button>
            <button class="obtn" onclick="sIT(this,'Accidente')" type="button">&#9888;&#65039; Accidente</button>
            <button class="obtn" onclick="sIT(this,'Problema m\xe9dico')" type="button">&#127973; Problema m&#233;dico</button>
            <button class="obtn" onclick="sIT(this,'Otra')" type="button">&#128221; Otra incidencia</button>
          </div>
        </div>
        <div class="inf"><label>Descripci&#243;n</label>
          <textarea id="indesc" placeholder="Describe lo ocurrido..."></textarea></div>
        <div class="inf"><label>Lugar</label>
          <select id="inlug">
            <option value="">&#8212; Seleccionar &#8212;</option>
            <option>Sala de actividades</option><option>Ba&#241;o</option>
            <option>Pasillo</option><option>Comedor</option>
            <option>Exterior / Jard&#237;n</option><option>Transporte</option><option>Otro</option>
          </select>
        </div>
        <button class="bsav" style="width:100%;font-size:18px;padding:18px" onclick="gInc()" type="button">
          &#9888;&#65039; Guardar incidencia
        </button>
      </div>
    </div>
  </div>
</div>

<div id="mdreg" class="hidden">
  <div class="mdbox">
    <div class="mddrag"></div>
    <div class="mdtit" id="mdtit">Registro</div>
    <div class="mdusr" id="mdusr">&#8212;</div>
    <div id="mdbody"></div>
    <div class="mdact">
      <button class="bcnc" onclick="cMd()" type="button">Cancelar</button>
      <button class="bsav" onclick="gReg()" type="button">&#10003; Guardar</button>
    </div>
  </div>
</div>
<div id="toast"></div>

  document.getElementById("app").classList.add("hidden");
  document.getElementById("ls").classList.remove("hidden");
  document.getElementById("lem").value="";document.getElementById("lpw").value="";
}
function updF(){
  var d=new Date();
  var ds=["Dom","Lun","Mar","Mi\u00e9","Jue","Vie","S\u00e1b"];
  var ms=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  document.getElementById("hfecha").textContent=ds[d.getDay()]+" "+d.getDate()+" "+ms[d.getMonth()]+
    " \u00b7 "+d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0");
}
setInterval(updF,60000);
function pobS(){
  var s=document.getElementById("inu");
  BD.forEach(function(u){var o=document.createElement("option");o.value=u.id;o.textContent=u.n+" "+u.a;s.appendChild(o);});
}
var VS=["home","usuarios","ficha","registros","incidencias"];
function irA(v){
  VS.forEach(function(x){document.getElementById("v-"+x).classList.toggle("hidden",x!==v);});
  if(v==="usuarios")rU();
  if(v==="registros")rRL();
  if(v==="incidencias")rInc();
}
function rU(){
  var q=(document.getElementById("srchu").value||"").toLowerCase();
  var lista=BD.filter(function(u){return(u.n+" "+u.a).toLowerCase().indexOf(q)>=0;});
  var h="";
  lista.forEach(function(u){
    h+='<div class="ucard" onclick="aF('+u.id+')">';
    h+='<div class="uav" style="background:'+cl(u.id)+'">'+ini(u.n,u.a)+'</div>';
    h+='<div class="unm">'+esc(u.n)+'</div><div class="uap">'+esc(u.a)+'</div>';
    if(u.et)h+='<span class="uet">'+u.et+'</span>';
    h+='</div>';
  });
  document.getElementById("ugrid").innerHTML=h;
}
function aF(id){
  var u=BD.find(function(x){return x.id===id;});if(!u)return;
  _fId=id;
  document.getElementById("fav").textContent=ini(u.n,u.a);
  document.getElementById("fav").style.background=cl(id);
  document.getElementById("fnm").textContent=u.n+" "+u.a;
  document.getElementById("fmeta").textContent=(u.et||"")+(u.gr?" \u00b7 Grupo "+u.gr:"");
  document.getElementById("ftit").textContent=u.n;
  var h="";
  TR.forEach(function(t){
    var n=(REG[t.id]||[]).filter(function(r){return r.userId===id;}).length;
    h+='<div class="rbtn" onclick="aMd(\''+t.id+'\','+id+')">';
    h+='<span class="rico">'+t.icon+'</span>';
    h+='<span class="rlbl">'+t.label+'</span>';
    h+='<span class="rn">'+(n>0?n+" hoy":"\u2014")+'</span></div>';
  });
  document.getElementById("rgrid").innerHTML=h;irA("ficha");
}
function rRL(){
  var h="";
  TR.forEach(function(t){
    var n=Object.values(REG).reduce(function(s,a){return s+(a||[]).filter(function(r){return r&&r.tipo===t.id;}).length;},0);
    h+='<div class="rl-card" onclick="aMdS(\''+t.id+'\')">';
    h+='<div class="rl-ico">'+t.icon+'</div>';
    h+='<div><div class="rl-t">'+t.label+'</div><div class="rl-n">'+(n>0?n+" registros hoy":"Sin registros")+'</div></div></div>';
  });
  document.getElementById("rlgrid").innerHTML=h;
}
function aMdS(tid){
  var t=TR.find(function(x){return x.id===tid;});
  _rA={tipo:tid,userId:null};_rO={};
  var h='<div class="mdf"><label>Usuario</label><select id="mduid"><option value="">&#8212; Seleccionar &#8212;</option>';
  BD.forEach(function(u){h+='<option value="'+u.id+'">'+esc(u.n+" "+u.a)+'</option>';});
  h+='</select></div>'+bF(t);
  document.getElementById("mdtit").innerHTML=t.icon+" "+t.label;
  document.getElementById("mdusr").textContent="Selecciona el usuario";
  document.getElementById("mdbody").innerHTML=h;
  document.getElementById("mdreg").classList.remove("hidden");
}
function aMd(tid,uid){
  var t=TR.find(function(x){return x.id===tid;});
  var u=BD.find(function(x){return x.id===uid;});
  _rA={tipo:tid,userId:uid};_rO={};
  document.getElementById("mdtit").innerHTML=t.icon+" "+t.label;
  document.getElementById("mdusr").textContent="\uD83D\uDC64 "+u.n+" "+u.a;
  document.getElementById("mdbody").innerHTML=bF(t);
  document.getElementById("mdreg").classList.remove("hidden");
}
function bF(t){
  var h="";
  t.fields.forEach(function(f){
    h+='<div class="mdf"><label>'+(f.label||f.k)+'</label>';
    if(f.opts){
      h+='<div class="mdopts">';
      f.opts.forEach(function(o){h+='<button class="mdopt" onclick="sO(this,\''+f.k+'\',\''+o.replace(/'/g,"\\'")+'\''+')" type="button">'+o+'</button>';});
      h+='</div>';
    } else if(f.type==="textarea"){
      h+='<textarea id="mf-'+f.k+'" placeholder="'+(f.placeholder||'')+'"></textarea>';
    } else {
      h+='<input id="mf-'+f.k+'" type="'+(f.type||"text")+'" placeholder="'+(f.placeholder||'')+'">';
    }
    h+='</div>';
  });
  return h;
}
function sO(btn,k,v){
  btn.parentElement.querySelectorAll(".mdopt").forEach(function(b){b.classList.remove("sel");});
  btn.classList.add("sel");_rO[k]=v;
}
function gReg(){
  var uid=_rA.userId;
  if(!uid){var s=document.getElementById("mduid");if(s)uid=parseInt(s.value);}
  if(!uid){sT("Selecciona un usuario");return;}
  var t=TR.find(function(x){return x.id===_rA.tipo;});
  t.fields.forEach(function(f){var el=document.getElementById("mf-"+f.k);if(el)_rO[f.k]=el.value;});
  var r=Object.assign({},_rO,{userId:uid,tipo:_rA.tipo,fecha:new Date().toISOString(),prof:_uA?_uA.nombre:"-"});
  if(!REG[_rA.tipo])REG[_rA.tipo]=[];
  REG[_rA.tipo].push(r);
  cMd();sT("\u2713 Registro guardado");
  if(_fId)aF(_fId);
}
function cMd(){document.getElementById("mdreg").classList.add("hidden");_rA=null;_rO={};}
function sIT(btn,t){
  document.querySelectorAll("#intopts .obtn").forEach(function(b){b.classList.remove("sel");});
  btn.classList.add("sel");_iT=t;
}
function gInc(){
  var uid=document.getElementById("inu").value;
  var desc=document.getElementById("indesc").value.trim();
  var lugar=document.getElementById("inlug").value;
  if(!uid){sT("Selecciona un usuario");return;}
  if(!_iT){sT("Selecciona el tipo");return;}
  if(!desc){sT("Describe la incidencia");return;}
  if(!REG.caidas)REG.caidas=[];
  REG.caidas.push({userId:parseInt(uid),tipo:_iT,desc:desc,lugar:lugar,
    fecha:new Date().toISOString(),prof:_uA?_uA.nombre:"-"});
  sT("\u26A0\uFE0F Incidencia registrada");rInc();irA("home");
}
function rInc(){
  document.getElementById("inu").value="";
  document.getElementById("indesc").value="";
  document.getElementById("inlug").value="";
  document.querySelectorAll("#intopts .obtn").forEach(function(b){b.classList.remove("sel");});
  _iT="";
}
function sT(m){
  var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2500);
}
</script>
</body>
</html>
